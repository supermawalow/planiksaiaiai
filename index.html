<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПЛАНИКС</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ПЛАНИКС</h1>

    <div class="page">
        <div class="left">
            <h2>Задачи</h2>
            <input type="text" id="taskInput" placeholder="Новая задача">
            <button id="addBtn">Добавить</button>
            <div id="taskList"></div>
        </div>

        <div class="right">
            <h2>Чат</h2>
            <div id="chatBox"></div>
            <input type="text" id="chatInput" placeholder="Вопрос">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
